name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pytest

      - name: Run tests
        run: pytest tests/

      - name: Build exe
        run: pyinstaller build.spec --noconfirm

      - name: Zip the app
        run: Compress-Archive -Path dist/TekkenTournamentOrganizer -DestinationPath TekkenTournamentOrganizer-win64.zip

      - name: Create release with the zip attached
        uses: softprops/action-gh-release@v2
        with:
          files: TekkenTournamentOrganizer-win64.zip
          generate_release_notes: true
          body: |
            Windows app for running the Tekken tournament -- no Python or any other install needed.

            ## How to run

            1. Download **TekkenTournamentOrganizer-win64.zip** below
            2. Extract it anywhere (e.g. the Desktop)
            3. Open the extracted folder and double-click **TekkenTournamentOrganizer.exe**
            4. If Windows Defender asks about network access, click **Allow**
            5. A browser opens with the QR code page -- players scan it to join from their phones

            Turn on **Windows Mobile Hotspot** on the host laptop and have everyone join that WiFi.
